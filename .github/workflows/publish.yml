name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

# 設定 NPM_TOKEN 說明：
# 1. 前往 https://www.npmjs.com/settings/xx455157/tokens
# 2. 點擊 "Generate New Token" > "Classic Token"
# 3. 選擇 "Publish" 類型，設定名稱為 "GitHub Actions"
# 4. 複製產生的 token
# 5. 在 GitHub repository 設定：Settings > Secrets and variables > Actions > New repository secret
# 6. 名稱設為 NPM_TOKEN，值貼上步驟 4 的 token

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
